<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Paramétrico de Patronaje 2D</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f0f3f5; color: #2c3e50; }
        .contenedor { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; text-align: center; margin-bottom: 20px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; }
        .valor-medida { font-weight: bold; min-width: 35px; text-align: right; color: #e67e22; }
        #estado { font-weight: bold; text-align: center; margin: 15px 0; }
        #area-dibujo { width: 100%; height: 400px; border: 2px dashed #bdc3c7; border-radius: 6px; overflow: hidden; background: #fcfcfc; }
        #panel-control { margin-top: 20px; padding-top: 15px; border-top: 1px solid #ecf0f1; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Motor Paramétrico de Patronaje 2D</h1>
    
    <div class="control-group">
        <label for="input-busto">Contorno de Busto (cm):</label>
        <div class="slider-container">
            <input type="range" id="input-busto" min="70" max="130" value="96">
            <span id="val-busto" class="valor-medida">96</span>
        </div>
    </div>

    <div class="control-group">
        <label for="input-cintura">Contorno de Cintura (cm):</label>
        <div class="slider-container">
            <input type="range" id="input-cintura" min="50" max="110" value="78">
            <span id="val-cintura" class="valor-medida">78</span>
        </div>
    </div>

    <div class="control-group">
        <label for="input-talle">Largo de Talle (cm):</label>
        <div class="slider-container">
            <input type="range" id="input-talle" min="30" max="60" value="42">
            <span id="val-talle" class="valor-medida">42</span>
        </div>
    </div>

    <div id="estado">Inicializando motor...</div>

    <div id="area-dibujo"></div>

    <div id="panel-control"></div>
</div>

<script src="script.js"></script>
</body>
</html>
